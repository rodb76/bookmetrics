name: dependency-check

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Setup R
        uses: r-lib/actions/setup-r@v2 # wait, is this right? r-lib/actions/setup-r@v2 is the official one.
        with:
          r-version: 'release'

      - name: Install remotes
        run: Rscript -e "install.packages('remotes')"

      - name: Check for outdated packages
        run: |
          Rscript -e '
            old_pkgs <- old.packages()
            if (!is.null(old_pkgs)) {
              cat("Outdated packages found:\n")
              print(old_pkgs)
              quit(status=1)
            } else {
              cat("All packages are up to date\n")
            }
          '