name: codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libuv1-dev \
            libfontconfig1-dev

      - name: Install Dependencies
        run: |
          Rscript -e 'install.packages(c("remotes", "pkgdown"), repos = "https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, upgrade = "always")'
          Rscript -e 'remotes::install_local()'
      

      - name: Install remotes
        run: Rscript -e 'install.packages("remotes", repos = "https://cloud.r-project.org")'

      - name: Install package deps
        run: |
          Rscript -e 'remotes::install_deps(dependencies = TRUE, upgrade = "always")'
          Rscript -e 'remotes::install_local()'
          Rscript -e 'install.packages("covr", repos = "https://cloud.r-project.org")'

      - name: Run coverage
        run: Rscript -e 'covr::codecov()'