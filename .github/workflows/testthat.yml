name: testthat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  testthat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-r-version: 'release'

      - name: Install Dependencies
        run: |
          pkgversion::pkg_install("remotes")
          remotes::install_deps(dependencies = true, upgrade = "always")

      - name: Run tests
        run: |
          library(testthat)
          testdir("tests/testthat")
