steps:
  - uses: actions/checkout@v4

  - name: Setup R
    uses: r-lib/actions/setup-r@v2
    with:
      r-version: 'release'

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y libuv1-dev

  - name: Install Dependencies
    run: |
      Rscript -e 'install.packages(c("remotes", "testthat"), repos = "https://cloud.r-project.org")'
      Rscript -e 'remotes::install_deps(dependencies = TRUE, upgrade = "always")'
      Rscript -e 'remotes::install_local()'

  - name: Run tests (skip if none)
    run: |
      Rscript -e 'if (length(list.files("tests/testthat", pattern="\\\\.R$", recursive = TRUE)) == 0) { message("No tests found — skipping."); quit(status = 0) } else { testthat::test_check("bookmetrics") }'